<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{title}}</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <div class="bg-orb orb-a"></div>
  <div class="bg-orb orb-b"></div>
  <header class="topbar">
    <div class="brand-wrap">
      <a class="brand" href="/index.html">{{siteTitle}}</a>
      <div class="toolbar" id="navToolbar"></div>
    </div>
    <div class="search-wrap">
      <input id="searchInput" type="search" placeholder="搜索文章标题..." autocomplete="off" />
      <div id="searchDropdown" class="search-dropdown hidden"></div>
    </div>
    <div class="actions">
      <button id="backToTree" type="button" class="hidden">返回目录</button>
      <button id="themeToggle" type="button">切换主题</button>
    </div>
  </header>
  <main class="layout">
    <aside class="sidebar" id="sidebar">
      <h2>目录</h2>
      {{tree}}
    </aside>
    <section class="content" id="content">
      {{content}}
    </section>
  </main>
  <script src="/assets/app.js"></script>
</body>
</html>
