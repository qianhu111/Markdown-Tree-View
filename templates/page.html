<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{title}}</title>
  <link rel="stylesheet" href="/assets/styles.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/index.html">Markdown Tree View</a>
    <input id="searchInput" type="search" placeholder="搜索标题或内容..." />
    <button id="themeToggle" type="button">切换主题</button>
  </header>
  <main class="layout">
    <aside class="sidebar">
      <h2>目录</h2>
      {{tree}}
    </aside>
    <section class="content">
      {{content}}
    </section>
    <aside class="rightbar">
      <h3>搜索结果</h3>
      <div id="searchResult"></div>
    </aside>
  </main>
  <script src="/assets/app.js"></script>
</body>
</html>
